services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agents
      POSTGRES_PASSWORD: agents
      POSTGRES_DB: agents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgresql://agents:agents@db:5432/agents
    ports:
      - "3000:3000"
    depends_on:
      - db

volumes:
  postgres-data:
