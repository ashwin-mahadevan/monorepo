[tools]
node = "25.8.0"
pnpm = "10.30.3"

[tasks.install]
run = "pnpm install --frozen-lockfile"

[tasks."dev:start"]
run = """
SESSION="ghactivity"
if tmux has-session -t $SESSION 2>/dev/null; then
  tmux attach -t $SESSION
else
  tmux new-session -d -s $SESSION "pnpm dlx @upstash/qstash-cli dev"
  tmux split-window -t $SESSION -h "pnpm dev"
  echo "Started tmux session '$SESSION' with qstash and nextjs side by side"
  tmux attach -t $SESSION
fi
"""

[tasks."dev:stop"]
run = """
SESSION="ghactivity"
if tmux has-session -t $SESSION 2>/dev/null; then
  tmux kill-session -t $SESSION
  echo "Killed tmux session '$SESSION'"
else
  echo "Tmux session '$SESSION' not running"
fi
"""

[tasks.build]
run = "pnpm build"

[tasks.check]
depends = ["format:check", "lint:check", "typecheck"]

[tasks."format:check"]
run = "pnpm format:check"

[tasks.format]
run = "pnpm format"

[tasks."lint:check"]
run = "pnpm lint:check"

[tasks.lint]
run = "pnpm lint"

[tasks.typecheck]
run = "pnpm typecheck"
