[tools]
node = "25.8.0"
pnpm = "10.30.3"

[tasks.install]
run = "pnpm install --frozen-lockfile"

[tasks."dev:start"]
run = """
SESSION="ghactivity"
if tmux has-session -t $SESSION 2>/dev/null; then
  echo "Tmux session '$SESSION' already running."
  echo "Attach with: tmux attach -t $SESSION"
else
  docker compose -f docker-compose.yml up -d
  tmux new-session -d -s $SESSION "pnpm dlx @upstash/qstash-cli dev"
  tmux split-window -t $SESSION -h "pnpm dev"
  tmux split-window -t $SESSION:0.0 -v "docker compose logs -f redis"
  tmux split-window -t $SESSION:0.1 -v "docker compose logs -f srh"
  echo "Started tmux session '$SESSION' with 4 panes:"
  echo "  Top-left: QStash CLI | Top-right: Next.js"
  echo "  Bottom-left: Redis logs | Bottom-right: SRH logs"
  echo "Attach with: tmux attach -t $SESSION"
  echo "Redis (SRH) running on http://localhost:8079"
fi
"""

[tasks."dev:stop"]
run = """
SESSION="ghactivity"
if tmux has-session -t $SESSION 2>/dev/null; then
  tmux kill-session -t $SESSION
  echo "Killed tmux session '$SESSION'"
else
  echo "Tmux session '$SESSION' not running"
fi
docker compose -f docker-compose.yml down
"""

[tasks.build]
run = "pnpm build"

[tasks.check]
depends = ["format:check", "lint:check", "typecheck"]

[tasks."format:check"]
run = "pnpm format:check"

[tasks.format]
run = "pnpm format"

[tasks."lint:check"]
run = "pnpm lint:check"

[tasks.lint]
run = "pnpm lint"

[tasks.typecheck]
run = "pnpm typecheck"
