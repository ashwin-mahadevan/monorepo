[tools]
node = "25.8.0"
pnpm = "10.30.3"

[tasks.install]
run = "pnpm install --frozen-lockfile"

[tasks.dev]
run = """
SESSION="ghactivity"
if tmux has-session -t $SESSION 2>/dev/null; then
  echo "Tmux session '$SESSION' already running."
  echo "Connect with: tmux attach -t $SESSION"
else
  tmux new-session -d -s $SESSION -n qstash "pnpm exec qstash dev" \; \
    new-window -n nextjs "pnpm dev"
  echo "Started tmux session '$SESSION' with qstash and nextjs"
  echo "Connect with: tmux attach -t $SESSION"
fi
"""

[tasks.build]
run = "pnpm build"

[tasks.check]
depends = ["format:check", "lint:check", "typecheck"]

[tasks."format:check"]
run = "pnpm format:check"

[tasks.format]
run = "pnpm format"

[tasks."lint:check"]
run = "pnpm lint:check"

[tasks.lint]
run = "pnpm lint"

[tasks.typecheck]
run = "pnpm typecheck"
