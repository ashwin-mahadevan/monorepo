[tools]
node = "25.8.0"
pnpm = "10.30.3"

[tasks.install]
run = "pnpm install --frozen-lockfile"

[tasks.dev]
run = "pnpm dev"

[tasks.build]
run = "pnpm build"

[tasks.check]
depends = ["format:check", "lint:check", "typecheck"]

[tasks."format:check"]
run = "pnpm format:check"

[tasks.format]
run = "pnpm format"

[tasks."lint:check"]
run = "pnpm lint:check"

[tasks.lint]
run = "pnpm lint"

[tasks.typecheck]
run = "pnpm typecheck"
