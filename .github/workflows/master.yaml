name: master

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  checks-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - binance-modeling
          - kalshi-trading
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
      - name: Install dependencies
        run: mise exec -- uv sync --frozen --all-groups
        working-directory: ${{ matrix.service }}
      - name: Format
        run: mise exec -- uv run --frozen ruff format --check src
        working-directory: ${{ matrix.service }}
      - name: Lint
        run: mise exec -- uv run --frozen ruff check src
        working-directory: ${{ matrix.service }}
      - name: Typecheck
        run: mise exec -- uv run --frozen mypy src
        working-directory: ${{ matrix.service }}

  checks-typescript:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - common
          - binance/archive
          - kalshi/orderbooks
          - kalshi/trades
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
          experimental: true
      - name: Install dependencies
        run: mise exec -- pnpm install --frozen-lockfile
        working-directory: ingest
      - name: Type check
        run: mise exec -- pnpm --filter @firm/$(basename ${{ matrix.service }}) typecheck
        working-directory: ingest
      - name: Format check
        run: mise exec -- pnpm prettier --check ${{ matrix.service }}
        working-directory: ingest
      - name: Lint check
        run: mise exec -- pnpm eslint ${{ matrix.service }}
        working-directory: ingest

  build-python:
    runs-on: ubuntu-latest
    needs: [checks-python]
    strategy:
      fail-fast: false
      matrix:
        service:
          - kalshi-trading
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/ashwin-mahadevan/monorepo/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-typescript:
    runs-on: ubuntu-latest
    needs: [checks-typescript]
    strategy:
      fail-fast: false
      matrix:
        service:
          - binance/archive
          - kalshi/orderbooks
          - kalshi/trades
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ingest/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/ashwin-mahadevan/monorepo/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ingest:
    runs-on: ubuntu-latest
    needs: [build-python, build-typescript]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.INGEST_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: ingest/compose.yaml
          target: /home/deploy
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.INGEST_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/deploy
            IMAGE_TAG=${{ github.sha }} docker compose -f ingest/compose.yaml pull
            IMAGE_TAG=${{ github.sha }} docker compose -f ingest/compose.yaml up -d --remove-orphans --no-build

  deploy-trading:
    runs-on: ubuntu-latest
    needs: [build-python]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.TRADING_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: kalshi-trading/compose.yaml
          target: /home/deploy
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.TRADING_DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /home/deploy
            IMAGE_TAG=${{ github.sha }} docker compose -f kalshi-trading/compose.yaml pull
            IMAGE_TAG=${{ github.sha }} docker compose -f kalshi-trading/compose.yaml up -d --remove-orphans --no-build
